<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 12px; fill: #2c3e50; }
      .small { font-size: 11px; fill: #555; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="600" height="420" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="300" y="26" text-anchor="middle" class="title">Exercice 5 - CalculatriceTriangle</text>

  <!-- GridPane outline -->
  <rect x="20" y="38" width="560" height="370" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="35" y="55" class="id-tag">GridPane (racine)</text>

  <!-- Ligne 1: x1 slider -->
  <text x="40" y="80" class="label">x1 :</text>
  <rect x="70" y="66" width="180" height="22" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="145" cy="77" r="6" fill="#3498db"/>
  <text x="70" y="100" class="id-tag">#slider-x1</text>

  <!-- Ligne 1: y1 slider -->
  <text x="280" y="80" class="label">y1 :</text>
  <rect x="310" y="66" width="180" height="22" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="385" cy="77" r="6" fill="#3498db"/>
  <text x="310" y="100" class="id-tag">#slider-y1</text>

  <!-- Ligne 2: x2 slider -->
  <text x="40" y="125" class="label">x2 :</text>
  <rect x="70" y="111" width="180" height="22" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="200" cy="122" r="6" fill="#3498db"/>
  <text x="70" y="145" class="id-tag">#slider-x2</text>

  <!-- Ligne 2: y2 slider -->
  <text x="280" y="125" class="label">y2 :</text>
  <rect x="310" y="111" width="180" height="22" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="440" cy="122" r="6" fill="#3498db"/>
  <text x="310" y="145" class="id-tag">#slider-y2</text>

  <!-- Ligne 3: x3 slider -->
  <text x="40" y="170" class="label">x3 :</text>
  <rect x="70" y="156" width="180" height="22" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="130" cy="167" r="6" fill="#3498db"/>
  <text x="70" y="190" class="id-tag">#slider-x3</text>

  <!-- Ligne 3: y3 slider -->
  <text x="280" y="170" class="label">y3 :</text>
  <rect x="310" y="156" width="180" height="22" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="360" cy="167" r="6" fill="#3498db"/>
  <text x="310" y="190" class="id-tag">#slider-y3</text>

  <!-- Aire TextField -->
  <text x="40" y="218" class="label">Aire :</text>
  <rect x="90" y="204" width="140" height="24" rx="3" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="160" y="221" text-anchor="middle" class="label" fill="#27ae60">9.0</text>
  <text x="90" y="242" class="id-tag">#aire (TextField non editable, lié par bind)</text>

  <!-- Panneau de dessin (triangle) -->
  <rect x="30" y="258" width="540" height="140" rx="4" fill="#fdfefe" stroke="#bdc3c7" stroke-width="1"/>
  <text x="45" y="274" class="id-tag">#dessin (Pane avec 3 Line)</text>

  <!-- Triangle dessiné -->
  <polygon points="160,380 420,380 290,290" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="160" cy="380" r="3" fill="#e74c3c"/>
  <circle cx="420" cy="380" r="3" fill="#27ae60"/>
  <circle cx="290" cy="290" r="3" fill="#8e44ad"/>
  <text x="148" y="394" class="small">P1</text>
  <text x="422" y="394" class="small">P2</text>
  <text x="293" y="286" class="small">P3</text>
  <text x="300" y="398" text-anchor="middle" class="small">3 Line liees aux proprietes du modele AireTriangle</text>
</svg>
