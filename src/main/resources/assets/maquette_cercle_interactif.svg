<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 12px; fill: #2c3e50; }
      .small { font-size: 11px; fill: #555; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3498db"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3498db"/>
    </marker>
  </defs>

  <!-- Fond -->
  <rect width="600" height="400" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="300" y="26" text-anchor="middle" class="title">Exercice 7 - CercleInteractif</text>

  <!-- Pane central -->
  <rect x="40" y="38" width="520" height="340" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Cercle centré -->
  <circle cx="300" cy="200" r="150" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
  <text x="300" y="204" text-anchor="middle" class="id-tag">#cercle</text>
  <text x="300" y="220" text-anchor="middle" class="small">(Circle, radius=150)</text>

  <!-- Rayon line -->
  <line x1="300" y1="200" x2="450" y2="200" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="375" y="192" text-anchor="middle" class="small" fill="#e74c3c">r = 150</text>

  <!-- Slider en bas -->
  <text x="40" y="316" class="id-tag">Slider #slider (max=250)</text>
  <rect x="55" y="322" width="380" height="18" rx="9" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="283" cy="331" r="9" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="55" y="355" class="small" fill="#7f8c8d">0</text>
  <text x="435" y="355" class="small" fill="#7f8c8d">250</text>

  <!-- TextField rayon -->
  <text x="450" y="316" class="id-tag">#rayon</text>
  <rect x="450" y="320" width="80" height="24" rx="3" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="490" y="337" text-anchor="middle" class="label">150.0</text>

  <!-- Fleches bidirectionnelles -->
  <line x1="283" y1="319" x2="283" y2="230" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="450" y1="332" x2="437" y2="332" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="430" y="360" class="small" fill="#27ae60">bindBidirectional</text>
  <text x="150" y="275" text-anchor="middle" class="small" fill="#3498db">bindBidirectional</text>
</svg>
