<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 12px; fill: #2c3e50; }
      .small { font-size: 11px; fill: #555; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
      .unit { font-size: 18px; font-weight: bold; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Fond -->
  <rect width="600" height="420" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="300" y="26" text-anchor="middle" class="title">Exercice 8 - ConvertisseurTemperatures</text>

  <!-- Panneau Celsius -->
  <rect x="30" y="40" width="240" height="350" rx="6" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <rect x="30" y="40" width="240" height="40" rx="6" fill="#3498db"/>
  <text x="150" y="66" text-anchor="middle" class="label" fill="white">Celsius (°C)</text>

  <!-- Slider vertical Celsius -->
  <text x="80" y="105" class="id-tag">#slider-celsius (max=100)</text>
  <text x="80" y="120" class="small">100</text>
  <rect x="100" y="115" width="18" height="200" rx="9" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="109" cy="215" r="9" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="80" y="325" class="small">0</text>

  <!-- TextField Celsius -->
  <text x="80" y="360" class="id-tag">#tf-celsius</text>
  <rect x="80" y="364" width="100" height="24" rx="3" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="130" y="381" text-anchor="middle" class="label">0</text>

  <!-- Panneau Fahrenheit -->
  <rect x="330" y="40" width="240" height="350" rx="6" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="330" y="40" width="240" height="40" rx="6" fill="#e74c3c"/>
  <text x="450" y="66" text-anchor="middle" class="label" fill="white">Fahrenheit (°F)</text>

  <!-- Slider vertical Fahrenheit -->
  <text x="380" y="105" class="id-tag">#slider-fahrenheit (max=212)</text>
  <text x="380" y="120" class="small">212</text>
  <rect x="400" y="115" width="18" height="200" rx="9" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="409" cy="315" r="9" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="380" y="325" class="small">32</text>

  <!-- TextField Fahrenheit -->
  <text x="380" y="360" class="id-tag">#tf-fahrenheit</text>
  <rect x="380" y="364" width="100" height="24" rx="3" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="430" y="381" text-anchor="middle" class="label">32</text>

  <!-- Fleche bidirectionnelle de conversion -->
  <line x1="275" y1="215" x2="325" y2="215" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="325" y1="230" x2="275" y2="230" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="300" y="210" text-anchor="middle" class="small" fill="#e74c3c">F = C*9/5+32</text>
  <text x="300" y="246" text-anchor="middle" class="small" fill="#3498db">C = (F-32)*5/9</text>
</svg>
