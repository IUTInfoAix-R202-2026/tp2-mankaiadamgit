<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 12px; fill: #2c3e50; }
      .small { font-size: 11px; fill: #555; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="600" height="400" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Titre -->
  <text x="300" y="28" text-anchor="middle" class="title">Exercice 3 - PaletteReactive</text>

  <!-- BorderPane outline -->
  <rect x="40" y="45" width="520" height="340" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Zone TOP (HBox avec 3 boutons) -->
  <rect x="40" y="45" width="520" height="55" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="55" y="63" class="id-tag">TOP (HBox)</text>

  <!-- Bouton Rouge -->
  <rect x="60" y="65" width="120" height="28" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="120" y="84" text-anchor="middle" class="label" fill="white">Rouge</text>
  <text x="120" y="105" text-anchor="middle" class="id-tag">#btn-rouge</text>

  <!-- Bouton Vert -->
  <rect x="200" y="65" width="120" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <text x="260" y="84" text-anchor="middle" class="label" fill="white">Vert</text>
  <text x="260" y="105" text-anchor="middle" class="id-tag">#btn-vert</text>

  <!-- Bouton Bleu -->
  <rect x="340" y="65" width="120" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="400" y="84" text-anchor="middle" class="label" fill="white">Bleu</text>
  <text x="400" y="105" text-anchor="middle" class="id-tag">#btn-bleu</text>

  <!-- Zone CENTER (zone colorée) -->
  <rect x="40" y="100" width="520" height="210" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="55" y="120" class="id-tag">CENTER (Pane)</text>
  <!-- Zone de couleur avec fond example -->
  <rect x="80" y="130" width="440" height="160" rx="4" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="300" y="215" text-anchor="middle" class="label" fill="#7f8c8d">Zone de couleur</text>
  <text x="300" y="233" text-anchor="middle" class="id-tag">#zone (Pane, minSize 300x200)</text>
  <text x="300" y="252" text-anchor="middle" class="small">Le fond change avec setStyle() via ChangeListener</text>

  <!-- Zone BOTTOM (Label compteurs) -->
  <rect x="40" y="310" width="520" height="75" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="55" y="328" class="id-tag">BOTTOM</text>
  <rect x="80" y="332" width="440" height="30" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="300" y="352" text-anchor="middle" class="label" fill="#2c3e50">Bienvenue !</text>
  <text x="300" y="375" text-anchor="middle" class="id-tag">#compteurs (Label) - textProperty lié par Bindings.when(total==0).then("Bienvenue !").otherwise(compteurs)</text>
</svg>
