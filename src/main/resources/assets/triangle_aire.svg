<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 13px; fill: #2c3e50; }
      .coord { font-size: 12px; fill: #8e44ad; font-weight: bold; }
      .formula { font-size: 13px; fill: #e74c3c; }
      .small { font-size: 11px; fill: #555; }
      .vertex { fill: #2c3e50; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Fond -->
  <rect width="600" height="400" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Titre -->
  <text x="300" y="28" text-anchor="middle" class="title">Exercice 4 - AireTriangle : formule du determinant</text>

  <!-- Axes (optionnel, pour situer les points) -->
  <line x1="100" y1="320" x2="480" y2="320" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="160" y1="80" x2="160" y2="340" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Triangle -->
  <!-- P1 = (160, 300) ; P2 = (420, 300) ; P3 = (290, 120) -->
  <polygon points="160,300 420,300 290,120" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>

  <!-- Sommets -->
  <circle cx="160" cy="300" r="5" fill="#e74c3c"/>
  <circle cx="420" cy="300" r="5" fill="#27ae60"/>
  <circle cx="290" cy="120" r="5" fill="#8e44ad"/>

  <!-- Etiquettes des sommets -->
  <text x="135" y="298" text-anchor="end" class="coord">P1(x1, y1)</text>
  <text x="428" y="298" class="coord">P2(x2, y2)</text>
  <text x="298" y="115" class="coord">P3(x3, y3)</text>

  <!-- Exemple de valeurs -->
  <text x="140" y="318" text-anchor="middle" class="small">(0, 0)</text>
  <text x="420" y="318" text-anchor="middle" class="small">(6, 0)</text>
  <text x="290" y="108" text-anchor="middle" class="small">(4, 3)</text>

  <!-- Ligne hauteur (pour illustrer) -->
  <line x1="290" y1="120" x2="290" y2="300" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="296" y="215" class="small" fill="#e74c3c">h</text>

  <!-- Formule -->
  <rect x="60" y="340" width="480" height="50" rx="4" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="300" y="360" text-anchor="middle" class="formula">aire = |x1*(y2-y3) + x2*(y3-y1) + x3*(y1-y2)| / 2</text>
  <text x="300" y="380" text-anchor="middle" class="small">Ex : |(0*(0-3) + 6*(3-0) + 4*(0-0))| / 2 = |18| / 2 = 9.0</text>
</svg>
